<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Anım AI - Canlı Ünsiyyət</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #avatar-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Avatar Videosu - 16:9 widescreen formatında */
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }
        
        .overlay { position: absolute; bottom: 50px; width: 90%; max-width: 600px; display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 30px; backdrop-filter: blur(10px); }
        input { flex: 1; background: transparent; border: none; color: white; font-size: 18px; outline: none; }
        .btn { background: #007bff; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        #status { position: absolute; top: 20px; left: 20px; color: #00ffcc; font-size: 14px; }
    </style>
</head>
<body>

    <div id="avatar-container">
        <div id="status">Sistem başladılır...</div>
        
        <video id="talking-head" autoplay playsinline></video>

        <div class="overlay">
            <input type="text" id="user-input" placeholder="Ona bir söz deyin...">
            <button class="btn" onclick="handleAction()">Göndər</button>
        </div>
    </div>

    <script>
        const API_URL = "SƏNİN_COLAB_URL_BURA"; // Məsələn: https://xxxx.ngrok-free.dev
        let peerConnection;
        let streamId;
        let sessionId;

        // 1. D-ID Streaming Sessiyasını Başlatmaq
        async function initStreaming() {
            document.getElementById('status').innerText = "Avatar canlandırılır...";
            
            const response = await fetch(`${API_URL}/start_session`, { method: 'POST' });
            const data = await response.json();
            
            const { id: sId, session_id: sessId, offer } = data;
            streamId = sId;
            sessionId = sessId;

            peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            
            peerConnection.ontrack = (event) => {
                document.getElementById('talking-head').srcObject = event.streams[0];
                document.getElementById('status').innerText = "Canlı: Sizi dinləyir";
            };

            await peerConnection.setRemoteDescription(offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            // Answer-i serverə geri göndər
            await fetch(`${API_URL}/connect`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ streamId, sessionId, answer })
            });
        }

        // 2. Mesaj Göndərmək və Avatarı Danışdırmaq
        async function handleAction() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            document.getElementById('status').innerText = "Düşünür və cavab verir...";
            input.value = "";

            await fetch(`${API_URL}/talk`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, streamId, sessionId })
            });
        }

        // Səhifə yüklənəndə sessiyanı başlat
        window.onload = initStreaming;
    </script>
</body>
</html>
