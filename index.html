<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anım AI - Təkmil İdarəetmə</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .setup-container { width: 100%; max-width: 400px; background: #1e1e1e; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .setup-container label { font-size: 13px; color: #888; display: block; margin-top: 15px; }
        .setup-container input, .setup-container select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #444; background: #252525; color: white; box-sizing: border-box; outline: none; }
        
        .chat-container { width: 100%; max-width: 450px; background: #1e1e1e; border-radius: 20px; display: none; flex-direction: column; height: 85vh; border: 1px solid #333; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #181818; }
        
        .avatar-header { display: flex; align-items: center; padding: 15px; background: #252525; gap: 15px; border-bottom: 1px solid #333; }
        .avatar-header img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #007bff; }
        
        .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; margin-bottom: 5px; word-wrap: break-word; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .ai { align-self: flex-start; background: #333; color: #eee; }
        
        .audio-controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 12px; width: fit-content; }
        .audio-btn { background: none; border: none; color: #00ffcc; cursor: pointer; font-size: 16px; }

        .input-area { display: flex; padding: 15px; background: #252525; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #3a3a3a; color: white; outline: none; }
        
        .mic-btn { background: #444; border: none; color: white; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mic-active { background: #ff4d4d; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .send-btn { background: #007bff; border: none; color: white; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; }
        #preview-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 2px solid #007bff; }
    </style>
</head>
<body>

    <div id="setup-area" class="setup-container">
        <h3 style="text-align: center; color: #007bff;">Profil Hazırlığı</h3>
        <label>Şəkil:</label>
        <input type="file" id="photo-input" accept="image/*" onchange="previewImage(this)">
        <img id="preview-img">
        <label>Onun adı:</label>
        <input type="text" id="char-name" placeholder="Adı daxil edin...">
        <label>Cinsiyyət:</label>
        <select id="char-gender">
            <option value="male">Kişi</option>
            <option value="female">Qadın</option>
        </select>
        <label>Xarakteri:</label>
        <select id="char-trait">
            <option value="mehriban">Mehriban</option>
            <option value="zarafatcıl">Zarafatcıl</option>
            <option value="ciddi">Ciddi</option>
        </select>
        <button class="send-btn" style="width: 100%; margin-top: 20px;" onclick="startApp()">Başla</button>
    </div>

    <div id="app-area" class="chat-container">
        <div class="avatar-header">
            <img id="chat-avatar" src="">
            <div><b id="display-name">Ad</b><br><small id="status-text" style="color: #00ffcc;">Hazır</small></div>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <button id="mic-btn" class="mic-btn">🎤</button>
            <input type="text" id="user-input" placeholder="Yazın və ya danışın...">
            <button class="send-btn" onclick="sendMessage()">Göndər</button>
        </div>
    </div>

    <script>
        const API_URL = "https://factorable-sean-precostal.ngrok-free.dev"; 
        let userPhoto = "";
        let recognition;
        let currentAudio = null;
        let isRecording = false;

        // Mikrofon Məntiqi
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'az-AZ';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript;
                document.getElementById('user-input').value = transcript;
                stopMicUI();
                sendMessage(); // Avtomatik göndər
            };

            recognition.onerror = () => stopMicUI();
            recognition.onend = () => stopMicUI();
        }

        document.getElementById('mic-btn').onclick = () => {
            if (!isRecording) {
                if (currentAudio) currentAudio.pause();
                recognition.start();
                isRecording = true;
                document.getElementById('mic-btn').classList.add('mic-active');
                document.getElementById('status-text').innerText = "Dinləyirəm... (Dayandırmaq üçün yenidən basın)";
            } else {
                recognition.stop();
                stopMicUI();
            }
        };

        function stopMicUI() {
            isRecording = false;
            document.getElementById('mic-btn').classList.remove('mic-active');
            document.getElementById('status-text').innerText = "Hazır";
        }

        // Enter Düyməsi İdarəetməsi
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Səs Çıxışı (Fallback ilə)
        async function speak(text, messageElement) {
            const status = document.getElementById('status-text');
            status.innerText = "Səs hazırlanır...";

            try {
                const response = await fetch(`${API_URL}/get_audio`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                if (!response.ok) throw new Error("RVC aktiv deyil");

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                createAudioPlayer(audioUrl, messageElement);
            } catch (error) {
                console.warn("RVC səs xətası, standart səsə keçilir.");
                status.innerText = "Standart səs işləyir...";
                
                // Fallback: Brauzer səsi
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'tr-TR'; 
                msg.pitch = document.getElementById('char-gender').value === 'male' ? 0.6 : 1.2;
                window.speechSynthesis.speak(msg);
                status.innerText = "Hazır";
            }
        }

        function createAudioPlayer(url, element) {
            const controls = document.createElement('div');
            controls.className = 'audio-controls';
            controls.innerHTML = `
                <button class="audio-btn" onclick="togglePlay(this, '${url}')">▶️</button>
                <button class="audio-btn" onclick="replay('${url}')">🔄</button>
            `;
            element.appendChild(controls);
            
            currentAudio = new Audio(url);
            currentAudio.play();
            document.getElementById('status-text').innerText = "Danışır...";
            
            currentAudio.onended = () => {
                document.getElementById('status-text').innerText = "Hazır";
                controls.querySelector('button').innerText = "▶️";
            };
        }

        function togglePlay(btn, url) {
            if (!currentAudio || currentAudio.src !== url) {
                currentAudio = new Audio(url);
            }
            if (currentAudio.paused) {
                currentAudio.play();
                btn.innerText = "⏸️";
            } else {
                currentAudio.pause();
                btn.innerText = "▶️";
            }
        }

        function replay(url) {
            if (currentAudio) currentAudio.pause();
            currentAudio = new Audio(url);
            currentAudio.play();
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    userPhoto = e.target.result;
                    document.getElementById('preview-img').src = userPhoto;
                    document.getElementById('preview-img').style.display = "block";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function startApp() {
            if (!userPhoto || !document.getElementById('char-name').value) return alert("Məlumatları tam doldurun!");
            document.getElementById('setup-area').style.display = "none";
            document.getElementById('app-area').style.display = "flex";
            document.getElementById('chat-avatar').src = userPhoto;
            document.getElementById('display-name').innerText = document.getElementById('char-name').value;
            sendMessage("Salam!"); 
        }

        async function sendMessage(overrideText = null) {
            const input = document.getElementById('user-input');
            const text = overrideText || input.value.trim();
            if (!text) return;

            const chatBox = document.getElementById('chat-box');
            if (!overrideText) chatBox.innerHTML += `<div class="message user">${text}</div>`;
            input.value = "";
            
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'message ai';
            aiMsgDiv.innerText = "...";
            chatBox.appendChild(aiMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ 
                        message: text,
                        name: document.getElementById('char-name').value,
                        trait: document.getElementById('char-trait').value
                    })
                });

                const data = await response.json();
                aiMsgDiv.innerText = data.reply;
                speak(data.reply, aiMsgDiv);

            } catch (error) {
                aiMsgDiv.innerText = "Xəta: Bağlantı kəsildi.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
